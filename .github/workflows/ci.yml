name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint (type-aware)
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build Chrome
        run: bun run build:chrome

      - name: Build Firefox
        run: bun run build:firefox

      - name: Zip Chrome
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run zip:chrome

      - name: Zip Firefox
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run zip:firefox

      - name: Upload extension packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-template-packages
          path: .output/*.zip
          if-no-files-found: error
