name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint (type-aware)
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build Chrome
        run: bun run build:chrome

      - name: Build Firefox
        run: bun run build:firefox

      - name: Zip Chrome
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run zip:chrome

      - name: Zip Firefox
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run zip:firefox

      - name: Debug package artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          #region agent log
          echo "Listing .output directory"
          ls -la .output
          echo "Listing zip candidates"
          ls -la .output/*.zip
          #endregion

      - name: Upload extension packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: browser-extension-template-packages
          path: .output/*.zip
          if-no-files-found: error
          include-hidden-files: true
